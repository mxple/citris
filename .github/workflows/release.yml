name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xxd libx11-dev libxrandr-dev libxcursor-dev \
            libxi-dev libgl-dev libudev-dev libfreetype-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DCPACK_PACKAGE_VERSION="${GITHUB_REF_NAME#v}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cd build && cpack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-archive
          path: build/citris-*.tar.gz

  build-windows:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xxd mingw-w64

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$PWD/cmake/mingw-w64-x86_64.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-mingw-dynamic \
            -DCPACK_PACKAGE_VERSION="${GITHUB_REF_NAME#v}"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: cd build && cpack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-archive
          path: build/citris-*.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - name: Download Linux archive
        uses: actions/download-artifact@v4
        with:
          name: linux-archive

      - name: Download Windows archive
        uses: actions/download-artifact@v4
        with:
          name: windows-archive

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip

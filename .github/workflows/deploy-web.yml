name: Deploy to GitHub Pages

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56

      - name: Install xxd
        run: sudo apt-get update && sudo apt-get install -y xxd

      - name: Configure
        run: emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-web -j$(nproc)

      - name: Prepare pages artifact
        run: |
          mkdir _site
          cp build-web/bin/citris.html _site/index.html
          cp build-web/bin/citris.js _site/
          cp build-web/bin/citris.wasm _site/
          cp build-web/bin/citris.data _site/ 2>/dev/null || true
          cp build-web/bin/citris.worker.js _site/ 2>/dev/null || true
          cp web/coi-serviceworker.js _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
